<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌面小秘书 - 宠物</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html {
        width: 100%;
        height: 100%;
        background: transparent;
      }
      body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      /* Opt 3 — pet transparency transition */
      .pet-body {
        opacity: 0.3;
        transition: opacity 0.3s ease-out;
      }
      .pet-body:hover {
        opacity: 1;
        transition: opacity 1s ease-in;
      }
      .pet-body.dragging {
        opacity: 1;
        transition: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/pet-entry.tsx"></script>
  </body>
</html>
