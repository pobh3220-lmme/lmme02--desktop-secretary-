name: Build & Release

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: desktop-secretary
        run: npm ci

      - name: Build Electron app
        working-directory: desktop-secretary
        run: npm run build

      - name: Package Windows installer
        working-directory: desktop-secretary
        run: npx electron-builder --win --x64

      - name: List build output
        run: |
          dir desktop-secretary\release\*.exe
          dir desktop-secretary\release\*.AppImage 2>nul || echo no appimage

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "desktop-secretary/release/*.exe,desktop-secretary/release/*.AppImage"
          tag: v1.0.2
          name: "桌面小秘书 v1.0.2"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
