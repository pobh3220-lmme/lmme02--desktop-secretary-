name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: desktop-secretary
        run: npm ci

      - name: Build Electron app
        working-directory: desktop-secretary
        run: npm run build

      - name: Package Windows installer
        working-directory: desktop-secretary
        run: npx electron-builder --win --x64

      - name: List output
        shell: pwsh
        run: Get-ChildItem desktop-secretary/release/*.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: desktop-secretary/release/*.exe
